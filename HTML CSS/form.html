<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <h2>Registration Form</h2>
    <form>
      Name: <input type="text" name="name" /><br /><br />
      Age: <input type="number" name="age" /><br /><br />
      Gender: <input type="radio" name="gender" value="male" id="male" />Male
      <input type="radio" name="gender" value="female" id="female" />Female
      <input
        type="radio"
        name="gender"
        value="other"
        id="other"
      />Other<br /><br />

      Language:
      <input
        type="checkbox"
        name="language"
        value="english"
        id="english"
      />English
      <input type="checkbox" name="language" value="nepali" id="nepali" />Nepali
      <input
        type="checkbox"
        name="language"
        value="hindi"
        id="hindi"
      />Hindi<br /><br />

      Address: <input type="text" name="address" /><br /><br />
      Contact: <input type="text" name="contact" /><br /><br />
      Email: <input type="email" name="email" /><br /><br />

      <label for="country">Select your country:</label>
      <select id="country" name="country">
        <option value="">Choose a Country</option>
        <option value="Nepal">Nepal</option>
        <option value="India">India</option>
        <option value="United States">United States</option></select
      ><br /><br />

      Message: <textarea name="message" rows="4" cols="50"></textarea
      ><br /><br />

      <input type="submit" value="Send Message" />
    </form>
  </body>
</html>
